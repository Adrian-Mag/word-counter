name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 matplotlib pyinstaller

      - name: Build executable
        run: pyinstaller word_counter.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WordCounter-windows
          path: dist/WordCounter.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WordCounter.exe
          name: WordCounter ${{ github.ref_name }}
          body: |
            ## WordCounter ${{ github.ref_name }}

            ### Download
            1. Download **WordCounter.exe** below
            2. Save it to your Desktop or anywhere you like
            3. Double-click to run — no installation needed!

            ### Features
            - Track words written throughout the day
            - View stats: daily charts, averages, streaks, and more
            - Your data is saved locally with automatic backups
          draft: false
          prerelease: false
